<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاينة هاتف آيفون - منظومة بسيط العقارية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0071e3;
            --bg-base: #f5f5f7;
            --text-main: #1d1d1f;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
            color: #000000;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #86868b;
        }

        /* Premium iPhone Frame */
        .iphone-container {
            position: relative;
            width: 390px;
            height: 800px;
            background-color: #000000;
            border-radius: 50px;
            padding: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            border: 4px solid #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Dynamic Island */
        .dynamic-island {
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 26px;
            background-color: #000000;
            border-radius: 20px;
            z-index: 10;
        }

        /* Screen Wrapper */
        .screen-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            border-radius: 38px;
            overflow: hidden;
            border: 1px solid #111111;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 38px;
        }

        /* Home Indicator bar at bottom */
        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            background-color: #000000;
            border-radius: 10px;
            z-index: 10;
            opacity: 0.8;
        }

        /* Side buttons */
        .button-volume-up, .button-volume-down, .button-power {
            position: absolute;
            background-color: #2c2c2e;
            border-radius: 3px;
        }

        .button-volume-up {
            left: -7px;
            top: 160px;
            width: 3px;
            height: 45px;
        }

        .button-volume-down {
            left: -7px;
            top: 215px;
            width: 3px;
            height: 45px;
        }

        .button-power {
            right: -7px;
            top: 185px;
            width: 3px;
            height: 70px;
        }

        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: #86868b;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            padding: 8px 18px;
            background-color: #ffffff;
            border: 1px solid #d2d2d7;
            border-radius: 30px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background-color: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>معاينة تفاعلية على هاتف آيفون 📱</h1>
        <p>استخدم الفأرة لتصفح المنظومة كأنها في يدك تماماً</p>
    </div>

    <div class="iphone-container">
        <div class="button-volume-up"></div>
        <div class="button-volume-down"></div>
        <div class="button-power"></div>
        
        <div class="dynamic-island"></div>
        
        <div class="screen-wrapper">
            <iframe src="/"></iframe>
        </div>
        
        <div class="home-indicator"></div>
    </div>

    <div class="footer-note">
        <p>تصميم تفاعلي مستجيب — شركة بسيط للبرمجة والأتمتة</p>
        <a href="/" class="btn-back">← العودة للوحة التحكم الكاملة</a>
    </div>

</body>
</html>
